<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ハンドボール作戦ボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* テキスト選択の無効化（ドラッグ時のちらつき防止） */
    .no-select { 
      user-select: none; 
      -webkit-user-select: none; 
    }
    
    /* 駒のテキストスタイル */
    .player-label { 
      font-family: sans-serif; 
      font-weight: bold; 
      pointer-events: none;
    }
    
    /* モーダルの背景ぼかし */
    .modal-backdrop { 
      backdrop-filter: blur(4px); 
    }
    
    /* ツールボタンのアクティブ状態 */
    .tool-btn.active { 
      background-color: #e5e7eb; 
      border-color: #9ca3af; 
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.1); 
    }
    
    /* アニメーション再生時のトランジション（滑らかな移動） */
    .animating-piece {
      transition: transform 1.2s ease-in-out;
    }
    .animating-line {
      transition: x1 1.2s ease-in-out, y1 1.2s ease-in-out, x2 1.2s ease-in-out, y2 1.2s ease-in-out;
    }

    /* 横スクロールバーを隠す */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* iPhoneのセーフエリア（ノッチ等）対応 */
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 🌟 スマホ縦画面・横画面に応じたヘッダーのレイアウト切り替え */
    @media (orientation: portrait) {
      .responsive-header {
        flex-wrap: wrap !important;
        overflow-x: visible !important;
        white-space: normal !important;
      }
      .separator {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden flex flex-col font-sans text-gray-800 touch-none select-none">

  <!-- 🌟 ヘッダーエリア（縦画面時は折り返し、横画面時は1行） -->
  <header class="bg-white shadow-sm z-20 flex-shrink-0 border-b border-gray-200">
    <div class="px-1 py-1 flex items-center justify-start gap-1 overflow-x-auto hide-scrollbar whitespace-nowrap responsive-header">
      
      <!-- 表示切り替え -->
      <select id="view-select" class="text-xs bg-gray-100 border border-gray-300 rounded px-1 py-1 font-bold text-gray-700 focus:outline-none cursor-pointer shrink-0">
        <option value="full">フルコート</option>
        <option value="half">ハーフコート</option>
      </select>

      <div class="w-px h-4 bg-gray-300 mx-0.5 shrink-0 separator"></div>

      <!-- 駒・アイテムの追加・初期化ボタン -->
      <div class="flex items-center gap-1 shrink-0">
        <button id="add-a-btn" class="px-1.5 py-1 bg-red-100 text-red-700 rounded text-xs font-bold shadow-sm border border-red-200">+赤</button>
        <button id="add-b-btn" class="px-1.5 py-1 bg-blue-100 text-blue-700 rounded text-xs font-bold shadow-sm border border-blue-200">+青</button>
        <button id="add-df-line-btn" class="px-1.5 py-1 bg-indigo-100 text-indigo-700 rounded text-xs font-bold shadow-sm border border-indigo-200">+線</button>
        <button id="add-cone-btn" class="px-1.5 py-1 bg-orange-100 text-orange-700 rounded text-xs font-bold shadow-sm border border-orange-200">+🔺</button>
        <button id="add-marker-btn" class="px-1.5 py-1 bg-yellow-100 text-yellow-700 rounded text-xs font-bold shadow-sm border border-yellow-300">+🟡</button>
        <button id="reset-btn" class="px-1.5 py-1 bg-gray-100 text-gray-700 rounded text-xs font-bold shadow-sm border border-gray-300 ml-0.5">初期化</button>
      </div>

      <div class="w-px h-4 bg-gray-300 mx-0.5 shrink-0 separator"></div>

      <!-- モード切り替え（移動・ペン） -->
      <div class="flex items-center gap-1 bg-gray-50 p-0.5 rounded border border-gray-200 shrink-0">
        <button id="mode-move" class="tool-btn active px-1.5 py-1 bg-white border border-gray-300 rounded text-xs font-bold flex items-center">
          👆
        </button>
        <button id="mode-draw-red" class="tool-btn px-1.5 py-1 bg-white border border-gray-300 rounded flex items-center justify-center" title="赤ペン">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
        </button>
        <button id="mode-draw-blue" class="tool-btn px-1.5 py-1 bg-white border border-gray-300 rounded flex items-center justify-center" title="青ペン">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
        </button>
        <div class="w-px h-4 bg-gray-300 mx-0.5"></div>
        <button id="clear-lines-btn" class="px-1.5 py-1 bg-gray-200 text-gray-700 rounded text-xs font-bold">🗑️</button>
      </div>

      <div class="w-px h-4 bg-gray-300 mx-0.5 shrink-0 separator"></div>

      <!-- 🎬 アニメーション動画コントロール -->
      <div class="flex items-center gap-1 bg-green-50 p-0.5 rounded border border-green-200 shrink-0 pr-2">
        <button id="record-scene-btn" class="px-1.5 py-1 bg-white border border-red-300 text-red-600 rounded text-[10px] font-bold shadow-sm flex items-center gap-0.5">
          ⏺ <span id="scene-count" class="bg-red-500 text-white px-1 py-0.5 rounded-full text-[9px] leading-none">0</span>
        </button>
        <button id="play-anim-btn" class="px-2 py-1 bg-green-500 text-white rounded text-[10px] font-bold shadow-sm">
          ▶ 再生
        </button>
        <button id="clear-anim-btn" class="px-1.5 py-1 bg-white border border-gray-300 text-gray-600 rounded text-[10px] font-bold shadow-sm">
          🗑️
        </button>
      </div>

    </div>
  </header>

  <!-- 🌟 作戦ボードエリア -->
  <main class="flex-grow relative w-full bg-[#2b3e50] overflow-hidden flex items-center justify-center" id="svg-container">
    
    <!-- SVGキャンバス -->
    <svg id="board" viewBox="-25 -15 850 430" preserveAspectRatio="xMidYMid meet" class="w-full h-full max-h-full object-contain block transition-all duration-500 touch-none drop-shadow-lg">
      <defs>
        <clipPath id="court-clip-full">
          <rect x="0" y="0" width="800" height="400" />
        </clipPath>
        <clipPath id="court-clip-half">
          <rect x="0" y="0" width="400" height="400" />
        </clipPath>

        <pattern id="goalPattern" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <rect width="5" height="10" fill="#ef4444" />
          <rect x="5" width="5" height="10" fill="white" />
        </pattern>

        <linearGradient id="courtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f5b87f" />
          <stop offset="100%" stop-color="#e09e5a" />
        </linearGradient>

        <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 2 L 10 5 L 0 8 L 2.5 5 z" fill="#ef4444" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 2 L 10 5 L 0 8 L 2.5 5 z" fill="#3b82f6" />
        </marker>
      </defs>

      <!-- ＝＝＝＝＝ フルコート描画 ＝＝＝＝＝ -->
      <g id="court-full">
        <!-- 背景の紺色領域もviewBoxに合わせて最小限に -->
        <rect x="-100" y="-100" width="1000" height="600" fill="#2b3e50" />
        <rect x="0" y="0" width="800" height="400" fill="url(#courtGrad)" />

        <g clip-path="url(#court-clip-full)">
          <line x1="400" y1="0" x2="400" y2="400" stroke="white" stroke-width="3" />
          <circle cx="400" cy="200" r="40" fill="none" stroke="white" stroke-width="2" />

          <!-- 左側エリア -->
          <path d="M 0 50 A 120 120 0 0 1 120 170 L 120 230 A 120 120 0 0 1 0 350 Z" fill="#4da6ff" stroke="white" stroke-width="2" />
          <path d="M 0 -10 A 180 180 0 0 1 180 170 L 180 230 A 180 180 0 0 1 0 410" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10, 10" />
          <line x1="140" y1="190" x2="140" y2="210" stroke="white" stroke-width="2" />
          <line x1="80" y1="195" x2="80" y2="205" stroke="white" stroke-width="2" />

          <!-- 右側エリア -->
          <path d="M 800 50 A 120 120 0 0 0 680 170 L 680 230 A 120 120 0 0 0 800 350 Z" fill="#4da6ff" stroke="white" stroke-width="2" />
          <path d="M 800 -10 A 180 180 0 0 0 620 170 L 620 230 A 180 180 0 0 0 800 410" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10, 10" />
          <line x1="660" y1="190" x2="660" y2="210" stroke="white" stroke-width="2" />
          <line x1="720" y1="195" x2="720" y2="205" stroke="white" stroke-width="2" />
        </g>

        <rect x="0" y="0" width="800" height="400" fill="none" stroke="white" stroke-width="3" />
        <line x1="310" y1="-5" x2="310" y2="5" stroke="white" stroke-width="3" />
        <line x1="490" y1="-5" x2="490" y2="5" stroke="white" stroke-width="3" />
        <rect x="-20" y="170" width="20" height="60" fill="url(#goalPattern)" stroke="white" stroke-width="2" />
        <rect x="800" y="170" width="20" height="60" fill="url(#goalPattern)" stroke="white" stroke-width="2" />
      </g>

      <!-- ＝＝＝＝＝ ハーフコート（縦向き）描画 ＝＝＝＝＝ -->
      <g id="court-half" style="display: none;">
        <!-- 背景の紺色領域もviewBoxに合わせて最小限に -->
        <rect x="-100" y="-100" width="600" height="600" fill="#2b3e50" />
        <rect x="0" y="0" width="400" height="400" fill="url(#courtGrad)" />

        <g clip-path="url(#court-clip-half)">
          <!-- センターライン（下部） -->
          <line x1="0" y1="400" x2="400" y2="400" stroke="white" stroke-width="3" />
          
          <!-- ゴールエリア (6m) -->
          <path d="M 50 0 A 120 120 0 0 0 170 120 L 230 120 A 120 120 0 0 0 350 0 Z" fill="#4da6ff" stroke="white" stroke-width="2" />
          <!-- フリースローライン (9m) -->
          <path d="M -10 0 A 180 180 0 0 0 170 180 L 230 180 A 180 180 0 0 0 410 0" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10, 10" />
          <!-- ペナルティライン (7m) -->
          <line x1="190" y1="140" x2="210" y2="140" stroke="white" stroke-width="2" />
          <!-- ゴールキーパーライン (4m) -->
          <line x1="185" y1="80" x2="215" y2="80" stroke="white" stroke-width="2" />
        </g>

        <!-- 外枠 -->
        <rect x="0" y="0" width="400" height="400" fill="none" stroke="white" stroke-width="3" />
        
        <!-- 交代ライン -->
        <line x1="-5" y1="310" x2="5" y2="310" stroke="white" stroke-width="3" />
        <line x1="395" y1="310" x2="405" y2="310" stroke="white" stroke-width="3" />
        
        <!-- ゴール -->
        <rect x="170" y="-20" width="60" height="20" fill="url(#goalPattern)" stroke="white" stroke-width="2" />
      </g>

      <!-- DFライン（結ぶ線）が描画されるレイヤー -->
      <g id="df-lines-layer"></g>
      <!-- 手書きペン（矢印）が描画されるレイヤー -->
      <g id="draw-layer"></g>
      <!-- 選手（駒）やアイテムが配置されるレイヤー -->
      <g id="players-layer"></g>
    </svg>
  </main>

  <!-- 名前変更用のモーダルダイアログ -->
  <div id="name-modal" class="fixed inset-0 bg-black bg-opacity-50 modal-backdrop hidden flex justify-center items-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-4 w-64 max-w-[90%] transform transition-all">
      <h3 class="text-sm font-bold text-gray-800 mb-3 text-center border-b pb-2">駒の名前を変更</h3>
      <input type="text" id="name-input" class="w-full border border-gray-300 rounded p-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-lg font-bold" autocomplete="off" maxlength="3" placeholder="背番号など">
      <div class="flex justify-between gap-2">
        <button id="modal-cancel" class="flex-1 py-1.5 bg-gray-200 text-gray-700 rounded text-sm font-bold">キャンセル</button>
        <button id="modal-save" class="flex-1 py-1.5 bg-blue-600 text-white rounded text-sm font-bold shadow">保存</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const svg = document.getElementById('board');
      const playersLayer = document.getElementById('players-layer');
      const dfLinesLayer = document.getElementById('df-lines-layer');
      const drawLayer = document.getElementById('draw-layer');
      
      const btnMove = document.getElementById('mode-move');
      const btnDrawRed = document.getElementById('mode-draw-red');
      const btnDrawBlue = document.getElementById('mode-draw-blue');
      const btnClearLines = document.getElementById('clear-lines-btn');
      const viewSelect = document.getElementById('view-select');

      let mode = 'move';
      let isDrawing = false;
      let currentPath = null;
      let pathData = '';

      // ==========================================
      // UI・モード制御
      // ==========================================
      function setMode(newMode) {
        mode = newMode;
        
        btnMove.classList.remove('active');
        btnDrawRed.classList.remove('active');
        btnDrawBlue.classList.remove('active');

        if (mode === 'move') {
          btnMove.classList.add('active');
          svg.style.cursor = 'default';
        } else {
          if (mode === 'draw-red') btnDrawRed.classList.add('active');
          if (mode === 'draw-blue') btnDrawBlue.classList.add('active');
          svg.style.cursor = 'crosshair';
        }
      }

      btnMove.addEventListener('click', () => setMode('move'));
      btnDrawRed.addEventListener('click', () => setMode('draw-red'));
      btnDrawBlue.addEventListener('click', () => setMode('draw-blue'));
      
      btnClearLines.addEventListener('click', () => { 
        drawLayer.innerHTML = ''; 
        players = players.filter(p => p.team !== 'df-node');
        renderPlayers();
      });

      // ==========================================
      // 🌟 初期配置データ（角度 "angle" を追加）
      // ==========================================
      const defaultPlayersFull = [
        // 赤チーム(A)は初期で右を向く(-90度)
        { id: 'a1', team: 'A', label: 'GK', x: 20, y: 200, angle: -90 }, { id: 'a2', team: 'A', label: 'LW', x: 130, y: 60, angle: -90 },
        { id: 'a3', team: 'A', label: 'LB', x: 150, y: 120, angle: -90 }, { id: 'a4', team: 'A', label: 'CB', x: 150, y: 200, angle: -90 },
        { id: 'a5', team: 'A', label: 'RB', x: 150, y: 280, angle: -90 }, { id: 'a6', team: 'A', label: 'RW', x: 130, y: 340, angle: -90 },
        { id: 'a7', team: 'A', label: 'PV', x: 130, y: 160, angle: -90 },
        // 青チーム(B)は初期で左を向く(90度)
        { id: 'b1', team: 'B', label: 'GK', x: 780, y: 200, angle: 90 }, { id: 'b2', team: 'B', label: 'RW', x: 670, y: 40, angle: 90 },
        { id: 'b3', team: 'B', label: 'RB', x: 650, y: 100, angle: 90 }, { id: 'b4', team: 'B', label: 'CB', x: 650, y: 200, angle: 90 },
        { id: 'b5', team: 'B', label: 'LB', x: 650, y: 300, angle: 90 }, { id: 'b6', team: 'B', label: 'LW', x: 670, y: 360, angle: 90 },
        { id: 'b7', team: 'B', label: 'PV', x: 670, y: 240, angle: 90 },
        { id: 'ball', team: 'ball', label: '⚽', x: 400, y: 200, angle: 0 }
      ];

      const defaultPlayersHalf = [
        // 守備側（赤）は初期で下を向く(0度)
        { id: 'a1', team: 'A', label: 'GK', x: 200, y: 20, angle: 0 },
        { id: 'a2', team: 'A', label: 'LW', x: 70, y: 110, angle: 0 },
        { id: 'a3', team: 'A', label: 'LB', x: 130, y: 130, angle: 0 },
        { id: 'a4', team: 'A', label: 'CB', x: 200, y: 140, angle: 0 },
        { id: 'a5', team: 'A', label: 'RB', x: 270, y: 130, angle: 0 },
        { id: 'a6', team: 'A', label: 'RW', x: 330, y: 110, angle: 0 },
        { id: 'a7', team: 'A', label: 'PV', x: 200, y: 110, angle: 0 },
        // 攻撃側（青）は初期で上を向く(180度)
        { id: 'b1', team: 'B', label: 'GK', x: 200, y: 380, angle: 180 },
        { id: 'b2', team: 'B', label: 'LW', x: 40, y: 300, angle: 180 },
        { id: 'b3', team: 'B', label: 'LB', x: 120, y: 250, angle: 180 },
        { id: 'b4', team: 'B', label: 'CB', x: 200, y: 270, angle: 180 },
        { id: 'b5', team: 'B', label: 'RB', x: 280, y: 250, angle: 180 },
        { id: 'b6', team: 'B', label: 'RW', x: 360, y: 300, angle: 180 },
        { id: 'b7', team: 'B', label: 'PV', x: 200, y: 160, angle: 180 },
        { id: 'ball', team: 'ball', label: '⚽', x: 200, y: 240, angle: 0 }
      ];

      viewSelect.addEventListener('change', (e) => {
        const val = e.target.value;
        if (val === 'full') {
          svg.setAttribute('viewBox', '-25 -15 850 430');
          document.getElementById('court-full').style.display = 'block';
          document.getElementById('court-half').style.display = 'none';
          players = JSON.parse(JSON.stringify(defaultPlayersFull));
        } else if (val === 'half') {
          svg.setAttribute('viewBox', '-15 -25 430 440');
          document.getElementById('court-full').style.display = 'none';
          document.getElementById('court-half').style.display = 'block';
          players = JSON.parse(JSON.stringify(defaultPlayersHalf));
        }
        
        drawLayer.innerHTML = ''; 
        scenes = []; 
        document.getElementById('scene-count').textContent = '0';
        renderPlayers();
      });

      function getMousePosition(evt) {
        const CTM = svg.getScreenCTM();
        if (evt.touches && evt.touches.length > 0) evt = evt.touches[0];
        else if (evt.changedTouches && evt.changedTouches.length > 0) evt = evt.changedTouches[0];
        return {
          x: (evt.clientX - CTM.e) / CTM.a,
          y: (evt.clientY - CTM.f) / CTM.d
        };
      }

      // ==========================================
      // ペン描画機能
      // ==========================================
      function startDraw(evt) {
        if (mode === 'move') return;
        evt.preventDefault();
        isDrawing = true;
        const pos = getMousePosition(evt);
        pathData = `M ${pos.x} ${pos.y}`;
        
        currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        currentPath.setAttribute('fill', 'none');
        currentPath.setAttribute('stroke-width', '4');
        currentPath.setAttribute('stroke-linecap', 'round');
        currentPath.setAttribute('stroke-linejoin', 'round');
        currentPath.setAttribute('opacity', '0.8');

        if (mode === 'draw-red') {
          currentPath.setAttribute('stroke', '#ef4444');
          currentPath.setAttribute('marker-end', 'url(#arrow-red)');
        } else {
          currentPath.setAttribute('stroke', '#3b82f6');
          currentPath.setAttribute('marker-end', 'url(#arrow-blue)');
        }
        
        currentPath.setAttribute('d', pathData);
        drawLayer.appendChild(currentPath);
      }

      function drawPath(evt) {
        if (!isDrawing || mode === 'move') return;
        evt.preventDefault();
        const pos = getMousePosition(evt);
        pathData += ` L ${pos.x} ${pos.y}`;
        currentPath.setAttribute('d', pathData);
      }

      function endDraw(evt) {
        if (isDrawing) { isDrawing = false; currentPath = null; }
      }

      svg.addEventListener('mousedown', (e) => { 
        if (!['circle', 'polygon', 'text', 'g'].includes(e.target.tagName)) startDraw(e); 
      });
      svg.addEventListener('mousemove', drawPath);
      window.addEventListener('mouseup', endDraw);
      
      svg.addEventListener('touchstart', (e) => { 
        if (e.touches.length === 1 && !['circle', 'polygon', 'text', 'g'].includes(e.target.tagName)) startDraw(e); 
      }, { passive: false });
      svg.addEventListener('touchmove', (e) => { 
        if (e.touches.length === 1 && isDrawing) drawPath(e); 
      }, { passive: false });
      window.addEventListener('touchend', endDraw);

      // ==========================================
      // アイテム（駒・コーン・マーカー・DFライン）の管理
      // ==========================================
      let players = [];
      let draggingElement = null;
      let offset = { x: 0, y: 0 };
      let dragStartTime = 0;
      let editingPlayerId = null;
      let nextId = 100;

      function updateDfLines() {
        const dfGroups = {};
        players.forEach(p => {
          if (p.team === 'df-node') {
            if (!dfGroups[p.groupId]) dfGroups[p.groupId] = [];
            dfGroups[p.groupId].push(p);
          }
        });

        const currentLineIds = new Set(Object.keys(dfGroups));
        Array.from(dfLinesLayer.children).forEach(child => {
          if (!currentLineIds.has(child.dataset.id)) child.remove();
        });

        Object.keys(dfGroups).forEach(groupId => {
          const nodes = dfGroups[groupId];
          if (nodes.length === 2) {
            let line = dfLinesLayer.querySelector(`line[data-id="${groupId}"]`);
            if (!line) {
              line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              line.dataset.id = groupId;
              line.setAttribute('stroke', 'rgba(59, 130, 246, 0.4)');
              line.setAttribute('stroke-width', '14');
              line.setAttribute('stroke-linecap', 'round');
              dfLinesLayer.appendChild(line);
            }
            line.setAttribute('x1', nodes[0].x);
            line.setAttribute('y1', nodes[0].y);
            line.setAttribute('x2', nodes[1].x);
            line.setAttribute('y2', nodes[1].y);
          }
        });
      }

      function renderPlayers() {
        const currentIds = new Set(players.map(p => p.id));
        Array.from(playersLayer.children).forEach(child => {
          if (!currentIds.has(child.dataset.id)) child.remove();
        });

        const dfNodes = players.filter(p => p.team === 'df-node');
        const otherPlayers = players.filter(p => p.team !== 'df-node');
        const sortedPlayers = [...dfNodes, ...otherPlayers];

        sortedPlayers.forEach(player => {
          let group = playersLayer.querySelector(`g[data-id="${player.id}"]`);

          if (!group) {
            group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', 'no-select cursor-pointer piece-group');
            group.dataset.id = player.id;

            if (player.team === 'cone') {
              const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
              shadow.setAttribute('rx', '12'); shadow.setAttribute('ry', '4'); shadow.setAttribute('cy', '12'); shadow.setAttribute('fill', 'rgba(0,0,0,0.3)');
              group.appendChild(shadow);
              const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
              polygon.setAttribute('points', '-10,12 10,12 0,-12'); polygon.setAttribute('fill', '#f97316'); polygon.setAttribute('stroke', 'white'); polygon.setAttribute('stroke-width', '2');
              group.appendChild(polygon);
            } else if (player.team === 'marker') {
              const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              shadow.setAttribute('r', '10'); shadow.setAttribute('cy', '2'); shadow.setAttribute('fill', 'rgba(0,0,0,0.3)');
              group.appendChild(shadow);
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('r', '10'); circle.setAttribute('fill', '#eab308'); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '2');
              group.appendChild(circle);
              const innerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              innerCircle.setAttribute('r', '3'); innerCircle.setAttribute('fill', 'none'); innerCircle.setAttribute('stroke', 'white'); innerCircle.setAttribute('stroke-width', '1.5');
              group.appendChild(innerCircle);
            } else if (player.team === 'df-node') {
              const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              hitArea.setAttribute('r', '16'); hitArea.setAttribute('fill', 'transparent'); 
              group.appendChild(hitArea);
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('r', '5'); circle.setAttribute('fill', '#3b82f6'); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '1.5');
              group.appendChild(circle);
            } else {
              const isBall = player.team === 'ball';
              // 🌟 3文字でも収まりやすいように、少しだけコマを大きく (16 -> 18)
              const radius = isBall ? 10 : 18; 
              let fill = '#ef4444'; if (isBall) fill = '#fde047'; else if (player.team === 'B') fill = '#3b82f6';
              
              const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              shadow.setAttribute('r', radius); shadow.setAttribute('cy', '3'); shadow.setAttribute('fill', 'rgba(0,0,0,0.3)');
              group.appendChild(shadow);

              // 🌟 体と足を回転させるためのグループ
              const bodyGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
              bodyGroup.setAttribute('class', 'body-rotation');
              if (player.angle !== undefined) {
                bodyGroup.setAttribute('transform', `rotate(${player.angle})`);
              }

              // 🌟 「手」と「足」の追加（ボール以外）
              if (!isBall) {
                const isGK = player.label.toUpperCase() === 'GK';
                
                if (isGK) {
                  // GKは「手（グローブ）」を前方に広げている表現
                  const leftHand = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                  leftHand.setAttribute('cx', '-15'); leftHand.setAttribute('cy', '11'); leftHand.setAttribute('r', '6');
                  leftHand.setAttribute('fill', '#e5e7eb'); // 明るいグレー
                  leftHand.setAttribute('stroke', '#374151'); // 暗いグレーの枠線
                  leftHand.setAttribute('stroke-width', '1.5');
                  bodyGroup.appendChild(leftHand);

                  const rightHand = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                  rightHand.setAttribute('cx', '15'); rightHand.setAttribute('cy', '11'); rightHand.setAttribute('r', '6');
                  rightHand.setAttribute('fill', '#e5e7eb');
                  rightHand.setAttribute('stroke', '#374151');
                  rightHand.setAttribute('stroke-width', '1.5');
                  bodyGroup.appendChild(rightHand);
                } else {
                  // フィールドプレイヤーは斜め「ハの字」の足
                  const leftFoot = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                  leftFoot.setAttribute('cx', '-10'); leftFoot.setAttribute('cy', '13'); leftFoot.setAttribute('rx', '5'); leftFoot.setAttribute('ry', '8');
                  leftFoot.setAttribute('fill', '#1f2937'); // ダークグレーの靴
                  leftFoot.setAttribute('transform', 'rotate(40, -10, 13)');
                  bodyGroup.appendChild(leftFoot);

                  const rightFoot = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                  rightFoot.setAttribute('cx', '10'); rightFoot.setAttribute('cy', '13'); rightFoot.setAttribute('rx', '5'); rightFoot.setAttribute('ry', '8');
                  rightFoot.setAttribute('fill', '#1f2937');
                  rightFoot.setAttribute('transform', 'rotate(-40, 10, 13)');
                  bodyGroup.appendChild(rightFoot);
                }
              }

              // 体（円）の描画
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('r', radius); circle.setAttribute('fill', fill); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '2');
              bodyGroup.appendChild(circle);

              group.appendChild(bodyGroup);

              // 🌟 名前テキストの描画（体と一緒に回転しないように外側に配置）
              const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
              text.setAttribute('x', '0'); 
              text.setAttribute('y', '4.5'); // 上下中央に微調整
              text.setAttribute('text-anchor', 'middle');
              text.setAttribute('fill', isBall ? 'black' : 'white'); 
              // 🌟 3文字でもはみ出ないようにフォントサイズと文字間隔を調整
              text.setAttribute('font-size', isBall ? '14' : '13');
              text.setAttribute('letter-spacing', '-0.5');
              text.setAttribute('class', 'player-label'); 
              text.textContent = player.label;
              group.appendChild(text);
            }

            group.addEventListener('mousedown', startPlayerDrag);
            group.addEventListener('touchstart', startPlayerDrag, { passive: false });
          } else {
            const textEl = group.querySelector('.player-label');
            if (textEl && player.team !== 'cone' && player.team !== 'marker' && player.team !== 'df-node') {
              textEl.textContent = player.label;
            }
            // 🌟 角度が更新されていれば図形を回転させる
            const bodyEl = group.querySelector('.body-rotation');
            if (bodyEl && player.angle !== undefined) {
              bodyEl.setAttribute('transform', `rotate(${player.angle})`);
            }
          }

          playersLayer.appendChild(group);
          group.style.transform = `translate(${player.x}px, ${player.y}px)`;
        });

        updateDfLines();
      }

      function startPlayerDrag(evt) {
        if (mode !== 'move' || isPlayingAnim) return;
        evt.preventDefault();
        evt.stopPropagation();

        dragStartTime = Date.now();
        const target = evt.currentTarget;
        const player = players.find(p => p.id === target.dataset.id);
        if (!player) return;

        draggingElement = { group: target, id: player.id, player: player, isMoved: false };
        const mousePos = getMousePosition(evt);
        offset.x = mousePos.x - player.x;
        offset.y = mousePos.y - player.y;

        target.setAttribute('opacity', '0.8');
        
        if (player.team !== 'df-node') {
          playersLayer.appendChild(target);
        }
      }

      function dragPlayer(evt) {
        if (!draggingElement || mode !== 'move') return;
        evt.preventDefault();
        draggingElement.isMoved = true;
        const mousePos = getMousePosition(evt);
        const newX = mousePos.x - offset.x;
        const newY = mousePos.y - offset.y;

        // 🌟 ドラッグした方向（進行方向）を計算し、体を自動的にその方向へ向かせる
        if (draggingElement.player.team === 'A' || draggingElement.player.team === 'B') {
          const dx = newX - draggingElement.player.x;
          const dy = newY - draggingElement.player.y;
          // 少しでも動いたら角度を更新
          if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
            // 進行方向に正しく向くように計算式を修正 (-90度に)
            draggingElement.player.angle = Math.atan2(dy, dx) * (180 / Math.PI) - 90;
            const bodyEl = draggingElement.group.querySelector('.body-rotation');
            if (bodyEl) bodyEl.setAttribute('transform', `rotate(${draggingElement.player.angle})`);
          }
        }
        
        draggingElement.player.x = newX;
        draggingElement.player.y = newY;
        draggingElement.group.style.transform = `translate(${newX}px, ${newY}px)`;

        if (draggingElement.player.team === 'df-node') {
          draggingElement.player.bindTo = null; 
          updateDfLines();
        } else {
          let needUpdateLines = false;
          players.forEach(p => {
            if (p.team === 'df-node' && p.bindTo === draggingElement.player.id) {
              p.x = newX;
              p.y = newY;
              const g = playersLayer.querySelector(`g[data-id="${p.id}"]`);
              if (g) g.style.transform = `translate(${newX}px, ${newY}px)`;
              needUpdateLines = true;
            }
          });
          if (needUpdateLines) updateDfLines();
        }
      }

      function endPlayerDrag(evt) {
        if (!draggingElement) return;
        draggingElement.group.setAttribute('opacity', '100');
        const { id, player, isMoved } = draggingElement;
        draggingElement = null;

        const dragDuration = Date.now() - dragStartTime;
        if (!isMoved && dragDuration < 300) {
          openNameModal(id);
          return;
        }

        if (player.team === 'df-node') {
          player.bindTo = null;
          for (let p of players) {
            if ((p.team === 'A' || p.team === 'B') && p.id !== player.id) {
              const dx = p.x - player.x;
              const dy = p.y - player.y;
              if (Math.sqrt(dx * dx + dy * dy) < 25) {
                player.bindTo = p.id;
                player.x = p.x;
                player.y = p.y;
                const group = playersLayer.querySelector(`g[data-id="${player.id}"]`);
                if (group) group.style.transform = `translate(${player.x}px, ${player.y}px)`;
                break;
              }
            }
          }
          renderPlayers();
        }

        // 枠外判定
        if (player.team !== 'ball' && (player.x < -60 || player.x > 860 || player.y < -60 || player.y > 460)) {
          if (player.team === 'df-node') {
            players = players.filter(p => p.groupId !== player.groupId);
          } else {
            players = players.filter(p => p.id !== id);
            players.forEach(p => { if (p.bindTo === id) p.bindTo = null; });
          }
          renderPlayers();
        }
      }

      window.addEventListener('mousemove', dragPlayer);
      window.addEventListener('touchmove', dragPlayer, { passive: false });
      window.addEventListener('mouseup', endPlayerDrag);
      window.addEventListener('touchend', endPlayerDrag);

      // ==========================================
      // 🌟 アニメーション機能のロジック
      // ==========================================
      let scenes = [];
      let isPlayingAnim = false;
      const sceneCountEl = document.getElementById('scene-count');
      const btnRecord = document.getElementById('record-scene-btn');
      const btnPlay = document.getElementById('play-anim-btn');
      const btnClearAnim = document.getElementById('clear-anim-btn');

      btnRecord.addEventListener('click', () => {
        if (isPlayingAnim) return;
        scenes.push(JSON.parse(JSON.stringify(players)));
        sceneCountEl.textContent = scenes.length;
        
        btnRecord.classList.add('bg-red-200');
        setTimeout(() => btnRecord.classList.remove('bg-red-200'), 200);
      });

      btnClearAnim.addEventListener('click', () => {
        if (isPlayingAnim) return;
        scenes = [];
        sceneCountEl.textContent = '0';
      });

      btnPlay.addEventListener('click', async () => {
        if (isPlayingAnim) return;
        if (scenes.length < 2) {
          alert("アニメーションを再生するには、シーンを2つ以上記録してください。\n\n1. 配置を決めて「⏺ 記録」を押す\n2. 駒を動かす\n3. 再度「⏺ 記録」を押す\n4. 「▶ 再生」で動きます！");
          return;
        }

        isPlayingAnim = true;
        btnPlay.innerHTML = '⏳ 再生中...';
        btnPlay.classList.add('opacity-50', 'cursor-not-allowed');

        players = JSON.parse(JSON.stringify(scenes[0]));
        renderPlayers();
        
        await new Promise(resolve => requestAnimationFrame(resolve));

        for (let i = 1; i < scenes.length; i++) {
          await new Promise(resolve => setTimeout(resolve, 300)); 
          
          const startScene = JSON.parse(JSON.stringify(players));
          const endScene = scenes[i];
          const duration = 1200; 
          
          await new Promise(resolve => {
            let startTime = null;
            function step(timestamp) {
              if (!startTime) startTime = timestamp;
              let progress = (timestamp - startTime) / duration;
              if (progress > 1) progress = 1;
              
              const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
              
              players = JSON.parse(JSON.stringify(endScene));
              players.forEach(p => {
                const startP = startScene.find(sp => sp.id === p.id);
                const endP = endScene.find(ep => ep.id === p.id);
                if (startP && endP) {
                  // 座標の補間
                  p.x = startP.x + (endP.x - startP.x) * ease;
                  p.y = startP.y + (endP.y - startP.y) * ease;
                  
                  // 🌟 角度（向き）の滑らかな補間（最短距離で回転）
                  if (startP.angle !== undefined && endP.angle !== undefined) {
                    let diff = (endP.angle - startP.angle) % 360;
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    p.angle = startP.angle + diff * ease;
                  }
                }
              });
              
              renderPlayers();
              
              if (progress < 1) requestAnimationFrame(step);
              else resolve();
            }
            requestAnimationFrame(step);
          });
        }

        isPlayingAnim = false;
        btnPlay.innerHTML = '▶ 再生';
        btnPlay.classList.remove('opacity-50', 'cursor-not-allowed');
      });

      // ==========================================
      // 追加・初期化ボタンの処理
      // ==========================================
      document.getElementById('reset-btn').addEventListener('click', () => {
        const isHalf = document.getElementById('view-select').value === 'half';
        players = JSON.parse(JSON.stringify(isHalf ? defaultPlayersHalf : defaultPlayersFull));
        drawLayer.innerHTML = ''; 
        scenes = []; 
        sceneCountEl.textContent = '0';
        renderPlayers();
      });
      
      function getAddPosition() {
        const isHalf = document.getElementById('view-select').value === 'half';
        return {
          x: (isHalf ? 200 : 400) + (Math.random() * 40 - 20),
          y: (isHalf ? 200 : 200) + (Math.random() * 40 - 20)
        };
      }

      document.getElementById('add-a-btn').addEventListener('click', () => { 
        const isHalf = document.getElementById('view-select').value === 'half';
        const p = getAddPosition(); 
        players.push({ id: `new_${nextId++}`, team: 'A', label: '+', x: p.x, y: p.y, angle: isHalf ? 0 : -90 }); 
        renderPlayers(); 
      });
      document.getElementById('add-b-btn').addEventListener('click', () => { 
        const isHalf = document.getElementById('view-select').value === 'half';
        const p = getAddPosition(); 
        players.push({ id: `new_${nextId++}`, team: 'B', label: '+', x: p.x, y: p.y, angle: isHalf ? 180 : 90 }); 
        renderPlayers(); 
      });
      document.getElementById('add-cone-btn').addEventListener('click', () => { const p = getAddPosition(); players.push({ id: `new_${nextId++}`, team: 'cone', label: '', x: p.x, y: p.y }); renderPlayers(); });
      document.getElementById('add-marker-btn').addEventListener('click', () => { const p = getAddPosition(); players.push({ id: `new_${nextId++}`, team: 'marker', label: '', x: p.x, y: p.y }); renderPlayers(); });
      
      document.getElementById('add-df-line-btn').addEventListener('click', () => { 
        const gId = `dfl_${nextId++}`;
        const p = getAddPosition();
        players.push({ id: `${gId}_1`, team: 'df-node', groupId: gId, label: '', x: p.x - 50, y: p.y }); 
        players.push({ id: `${gId}_2`, team: 'df-node', groupId: gId, label: '', x: p.x + 50, y: p.y }); 
        renderPlayers(); 
      });

      // ==========================================
      // 名前変更モーダルの処理
      // ==========================================
      const modal = document.getElementById('name-modal');
      const nameInput = document.getElementById('name-input');
      
      function openNameModal(id) {
        const player = players.find(p => p.id === id);
        if (!player || player.team === 'ball' || player.team === 'cone' || player.team === 'marker' || player.team === 'df-node') return;
        editingPlayerId = id; nameInput.value = player.label; modal.classList.remove('hidden'); 
        setTimeout(() => { nameInput.focus(); nameInput.select(); }, 50);
      }
      function closeModal() { modal.classList.add('hidden'); editingPlayerId = null; }
      function saveName() {
        if (editingPlayerId) {
          const player = players.find(p => p.id === editingPlayerId);
          if (player) { player.label = nameInput.value.trim() || ' '; renderPlayers(); }
        }
        closeModal();
      }
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', saveName);
      nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveName(); if (e.key === 'Escape') closeModal(); });

      // 初期起動
      players = JSON.parse(JSON.stringify(defaultPlayersFull));
      renderPlayers();
    });
  </script>
</body>
</html>
